---
# tasks file for roles/nginx_proxy_manager

- name: "NPM : Détecter la version de PCRE requise"
  ansible.builtin.set_fact:
    pcre_package: "{{ 'libpcre2-dev' if ansible_facts['distribution_major_version'] | int >= 13 else 'libpcre3-dev' }}"

- name: "NPM : Installer les dépendances de compilation système"
  ansible.builtin.apt:
    name:
      - git
      - curl
      - build-essential
      - "{{ pcre_package }}"
      - libssl-dev
      - zlib1g-dev
      - python3
      - python3-pip
      - gnupg
    state: present
    update_cache: yes

- name: "NPM : Configurer le dépôt NodeSource et installer Node.js + Yarn"
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://deb.nodesource.com/setup_{{ npm_node_version }}.x | bash -
    apt-get install -y nodejs
    npm install --global yarn
  args:
    creates: /usr/bin/yarn

- name: "NPM : Télécharger et compiler OpenResty depuis les sources"
  ansible.builtin.shell: |
    set -e
    cd /tmp
    wget https://openresty.org/download/openresty-{{ openresty_version }}.tar.gz
    tar -xzf openresty-{{ openresty_version }}.tar.gz
    cd openresty-{{ openresty_version }}
    ./configure \
      --with-http_v2_module \
      --with-http_realip_module \
      --with-http_stub_status_module \
      --with-http_ssl_module \
      --with-http_sub_module \
      --with-http_auth_request_module \
      --with-pcre-jit \
      --with-stream \
      --with-stream_ssl_module
    make -j"$(nproc)"
    make install
    rm -rf /tmp/openresty-{{ openresty_version }}*
  args:
    creates: /usr/local/openresty/nginx/sbin/nginx

- name: "NPM : Créer le fichier d'unité Systemd pour OpenResty"
  ansible.builtin.copy:
    dest: /lib/systemd/system/openresty.service
    content: |
      [Unit]
      Description=The OpenResty Application Platform
      After=syslog.target network-online.target remote-fs.target nss-lookup.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      Group=root
      ExecStartPre=-/bin/mkdir -p /tmp/nginx/body /run/nginx /var/log/nginx /usr/local/openresty/nginx/logs
      ExecStart=/usr/local/openresty/nginx/sbin/nginx -c /etc/nginx/nginx.conf
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: "NPM : Récupérer les sources complètes de Nginx Proxy Manager"
  ansible.builtin.git:
    repo: "https://github.com/NginxProxyManager/nginx-proxy-manager.git"
    dest: "{{ npm_opt_dir }}"
    version: "{{ npm_version }}"
    force: yes

- name: "NPM : Créer l'ensemble des répertoires requis"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0777'
  loop:
    - /var/www/html
    - /etc/nginx/logs
    - /app/frontend/images
    - /tmp/nginx/body
    - /run/nginx
    - /data/nginx
    - /data/custom_ssl
    - /data/logs
    - /data/access
    - /data/nginx/default_host
    - /data/nginx/default_www
    - /data/nginx/proxy_host
    - /data/nginx/redirection_host
    - /data/nginx/stream
    - /data/nginx/dead_host
    - /data/nginx/temp
    - /var/lib/nginx/cache/public
    - /var/lib/nginx/cache/private
    - /var/cache/nginx/proxy_temp

- name: "NPM : Déployer la configuration de la structure rootfs de NPM"
  ansible.builtin.shell: |
    cp -r {{ npm_opt_dir }}/docker/rootfs/var/www/html/* /var/www/html/
    cp -r {{ npm_opt_dir }}/docker/rootfs/etc/nginx/* /etc/nginx/
    cp {{ npm_opt_dir }}/docker/rootfs/etc/letsencrypt.ini /etc/letsencrypt.ini
    cp {{ npm_opt_dir }}/docker/rootfs/etc/logrotate.d/nginx-proxy-manager /etc/logrotate.d/nginx-proxy-manager
    ln -sf /usr/local/openresty/nginx/sbin/nginx /usr/sbin/nginx
    ln -sf /usr/local/openresty/nginx/ /etc/nginx
    ln -sf /etc/nginx/nginx.conf /etc/nginx/conf/nginx.conf
    rm -f /etc/nginx/conf.d/dev.conf

- name: "NPM : Nettoyer et lier la configuration globale Nginx"
  ansible.builtin.shell: |
    cp {{ npm_opt_dir }}/docker/rootfs/etc/nginx/nginx.conf /usr/local/openresty/nginx/conf/nginx.conf
    sed -i 's+^daemon+#daemon+g' /usr/local/openresty/nginx/conf/nginx.conf
    sed -i 's+include conf.d+include /etc/nginx/conf.d+g' /usr/local/openresty/nginx/conf/nginx.conf
    
    # Remplacement global sur les deux fichiers pour éviter le blocage getpwnam("npm")
    sed -i 's/user npm;/user root;/g' /usr/local/openresty/nginx/conf/nginx.conf
    sed -i 's/user npm;/user root;/g' /etc/nginx/nginx.conf
    
    sed -i 's/^pid/#pid/g' /usr/local/openresty/nginx/conf/nginx.conf
    sed -r -i 's/^([[:space:]]*)su npm npm/\1#su npm npm/g;' /etc/logrotate.d/nginx-proxy-manager

- name: "NPM : Générer le fichier de résolution DNS pour Nginx"
  ansible.builtin.shell: |
    echo resolver "$(awk 'BEGIN{ORS=" "} $1=="nameserver" {print ($2 ~ ":")? "["$2"]": $2}' /etc/resolv.conf);" > /etc/nginx/conf.d/include/resolvers.conf

- name: "NPM : Générer le certificat SSL Dummy de secours"
  ansible.builtin.shell: |
    openssl req -new -newkey rsa:2048 -days 3650 -nodes -x509 -subj "/O=Nginx Proxy Manager/OU=Dummy Certificate/CN=localhost" -keyout /data/nginx/dummykey.pem -out /data/nginx/dummycert.pem
  args:
    creates: /data/nginx/dummycert.pem

- name: "NPM : Copier le code du Backend vers /app"
  ansible.builtin.copy:
    src: "{{ npm_opt_dir }}/backend/"
    dest: "{{ npm_base_dir }}/"
    remote_src: yes

- name: "NPM : Compiler le Frontend (Yarn Build)"
  ansible.builtin.shell: |
    export NODE_OPTIONS="--max_old_space_size=1024 --openssl-legacy-provider"
    cd {{ npm_opt_dir }}/frontend
    sed -E -i 's/"node-sass" *: *"([^"]*)"/"sass": "\1"/g' package.json
    yarn install --network-timeout 600000
    yarn locale-compile
    yarn build
    
    # Prise en compte de la structure du dossier dist (selon les versions de Vite/NPM)
    if [ -d "{{ npm_opt_dir }}/frontend/dist/frontend" ]; then
      cp -r {{ npm_opt_dir }}/frontend/dist/frontend/* {{ npm_base_dir }}/frontend/
    else
      cp -r {{ npm_opt_dir }}/frontend/dist/* {{ npm_base_dir }}/frontend/
    fi
    
    cp -r {{ npm_opt_dir }}/frontend/public/images/* {{ npm_base_dir }}/frontend/images
  args:
    creates: "{{ npm_base_dir }}/frontend/index.html"

- name: "NPM : Ajuster les permissions de lecture du Frontend"
  ansible.builtin.file:
    path: "{{ npm_base_dir }}/frontend"
    state: directory
    mode: '0755'
    recurse: yes

- name: "NPM : Configurer le fichier de production de la base de données (SQLite Native)"
  ansible.builtin.copy:
    dest: "{{ npm_base_dir }}/config/production.json"
    content: |
      {
        "database": {
          "engine": "knex-native",
          "knex": {
            "client": "better-sqlite3",
            "connection": {
              "filename": "/data/database.sqlite"
            },
            "useNullAsDefault": true
          }
        }
      }

- name: "NPM : Initialiser et installer le Backend"
  ansible.builtin.shell: |
    rm -rf {{ npm_base_dir }}/config/default.json
    cd {{ npm_base_dir }}
    sed -i 's/"version": "2.0.0"/"version": "2.15.1"/g' package.json 2>/dev/null || true
    yarn install --network-timeout 600000
  args:
    creates: "{{ npm_base_dir }}/node_modules/better-sqlite3"

- name: "NPM : Créer le service Systemd npm.service"
  ansible.builtin.copy:
    dest: /lib/systemd/system/npm.service
    content: |
      [Unit]
      Description=Nginx Proxy Manager
      After=network.target openresty.service

      [Service]
      Type=simple
      Environment=NODE_ENV=production
      Environment=CERTBOT_VERSION=2.5.0
      WorkingDirectory={{ npm_base_dir }}
      ExecStart=/usr/bin/node index.js
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: "NPM : Activer et démarrer l'ensemble des services"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: yes
    daemon_reload: yes
  loop:
    - openresty
    - npm