services:
  app:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: https://vaultwarden-docker-lxc.azby.fr
    volumes:
      - ./vw-data/:/data/
    networks:
      - proxy_network
networks:
  proxy_network:
    external: true