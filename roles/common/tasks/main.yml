---
# tasks file for roles/common

# 1. INITIALISATION DES VARIABLES GLOBALES
- name: "Système : Récupérer la configuration du conteneur courant"
  ansible.builtin.set_fact:
    current_ct: "{{ containers | selectattr('hostname', 'equalto', ansible_facts['hostname']) | first }}"

# Extraction de l'IP propre (sans le masque /24) du fichier config.yml
- name: "Système : Extraire l'IP statique du conteneur"
  ansible.builtin.set_fact:
    static_ip: "{{ current_ct.address | split('/') | first }}"

# 1.1 CONFIGURATION DES FEATURES PROXMOX À CHAUD
- name: "Proxmox : Vérifier et activer keyctl si demandé dans config.yml"
  block:
    - name: "Proxmox : Récupérer la configuration actuelle des features du LXC"
      ansible.builtin.command: "pct config {{ current_ct.vm_id }}"
      register: lxc_config
      changed_when: false
      delegate_to: "{{ proxmox.ip }}"
      vars:
        ansible_user: "{{ ansible.ansible_user }}"

    - name: "Proxmox : Activer keyctl sur le conteneur LXC"
      ansible.builtin.command: "pct set {{ current_ct.vm_id }} --features nesting=1,keyctl=1"
      register: keyctl_activation
      # On ne lance la commande que si 'keyctl=1' n'est pas déjà présent dans la configuration du LXC
      when: "'keyctl=1' not in lxc_config.stdout"
      notify: "Redémarrer le conteneur LXC"
      delegate_to: "{{ proxmox.ip }}"
      vars:
        ansible_user: "{{ ansible.ansible_user }}"

  # Ce bloc entier ne s'exécute QUE si keyctl est défini à true dans ton config.yml
  when: "current_ct.keyctl is defined and current_ct.keyctl | bool"

# 2. CONFIGURATION ET MISE À JOUR DE BASE
- name: "Système : Configurer le fuseau horaire sur Europe/Paris"
  community.general.timezone:
    name: Europe/Paris

- name: "Système : Mettre à jour les dépôts APT et patcher le système"
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist

- name: "Système : Installer les outils de base indispensables"
  ansible.builtin.apt:
    name:
      - curl
      - htop
      - git
    state: present

- name: "Système : Nettoyer les paquets APT inutilisés (Autoremove & Autoclean)"
  ansible.builtin.apt:
    autoremove: yes
    autoclean: yes

# 3. INSTALLATION ET CONFIGURATION DE NODE EXPORTER
- name: "Node Exporter : Créer le groupe système"
  ansible.builtin.group:
    name: node_exporter
    system: yes
    state: present

- name: "Node Exporter : Créer l'utilisateur système"
  ansible.builtin.user:
    name: node_exporter
    group: node_exporter
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
    state: present

- name: "Node Exporter : Télécharger et désarchiver le binaire officiel"
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz"
    dest: /tmp/
    remote_src: yes
    creates: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter

- name: "Node Exporter : Copier le binaire dans le dossier système"
  ansible.builtin.copy:
    src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    remote_src: yes
    owner: root
    group: root
    mode: '0755'
  notify: "Restart Node Exporter"

- name: "Node Exporter : Créer le fichier de service Systemd"
  ansible.builtin.blockinfile:
    path: /etc/systemd/system/node_exporter.service
    create: yes
    owner: root
    group: root
    mode: '0644'
    block: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=multi-user.target
  notify: "Restart Node Exporter"

- name: "Node Exporter : S'assurer que le service est démarré et activé"
  ansible.builtin.systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

- name: "DNS : Forcer l'utilisation d'AdGuard Home dans le resolv.conf"
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    owner: nobody
    group: nogroup
    mode: '0444'
    content: |
      nameserver 192.168.1.105
      search home
  when: "'adguard' not in ansible_facts['hostname']"

# 4. GESTION AUTOMATIQUE DU DNS ADGUARD
- name: "AdGuard : Récupérer la liste des réécritures DNS existantes"
  ansible.builtin.uri:
    url: "http://{{ current_ct.dns_server }}:80/control/rewrite/list"
    method: GET
    user: "root"
    password: "adguard_pour_avoir_mon_dns"
    force_basic_auth: yes
    status_code: 200
  register: adguard_rewrites
  delegate_to: localhost

- name: "AdGuard : Supprimer l'ancienne réécriture DNS (si elle existe avec une IP différente)"
  ansible.builtin.uri:
    url: "http://{{ current_ct.dns_server }}:80/control/rewrite/delete"
    method: POST
    user: "root"
    password: "adguard_pour_avoir_mon_dns"
    force_basic_auth: yes
    status_code: [200, 201]
    body_format: json
    body:
      domain: "{{ ansible_facts['hostname'] }}.home"
      answer: "{{ item.answer }}"
  loop: "{{ adguard_rewrites.json }}"
  when: "item.domain == (ansible_facts['hostname'] ~ '.home') and item.answer != static_ip"
  delegate_to: localhost

- name: "AdGuard : Créer ou mettre à jour la réécriture DNS avec l'IP du config.yml"
  ansible.builtin.uri:
    url: "http://{{ current_ct.dns_server }}:80/control/rewrite/add"
    method: POST
    user: "root"
    password: "adguard_pour_avoir_mon_dns"
    force_basic_auth: yes
    status_code: [200, 201]
    body_format: json
    body:
      domain: "{{ ansible_facts['hostname'] }}.home"
      answer: "{{ static_ip }}"
  # On ne l'ajoute que si la règle exacte n'existe pas déjà
  when: "adguard_rewrites.json | selectattr('domain', 'equalto', ansible_facts['hostname'] ~ '.home') | selectattr('answer', 'equalto', static_ip) | list | length == 0"
  delegate_to: localhost

# 5. PERSONNALISATION DU SHELL
- name: "Système : Activer les alias de base (.bashrc)"
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^#?alias ll=", line: "alias ll='ls -alF'" }
    - { regexp: "^#?alias la=", line: "alias la='ls -A'" }